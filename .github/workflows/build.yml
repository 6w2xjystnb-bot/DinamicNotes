name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build using XcodeGen
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Unsigned Archive
        run: |
          xcodebuild archive \
            -project DinamicNotes.xcodeproj \
            -scheme DinamicNotes \
            -archivePath DinamicNotes.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r DinamicNotes.xcarchive/Products/Applications/*.app Payload/
          zip -r DinamicNotes.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sideload-ipa
          path: DinamicNotes.ipa
